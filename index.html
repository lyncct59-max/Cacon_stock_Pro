<!DOCTYPE html>
<html>
<head>
  <title>Cacon Stock PRO MAX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body class="bg-gray-900 text-white p-6">

<div id="login-box">
  <h2 class="text-xl mb-2">Login</h2>
  <input id="email" placeholder="Email" class="text-black p-2 mb-2"><br>
  <input id="password" type="password" placeholder="Password" class="text-black p-2 mb-2"><br>
  <button onclick="handleLogin()" class="bg-green-600 px-4 py-2">Login</button>
</div>

<div id="app" style="display:none">

<h1 class="text-2xl mb-4">Cacon Stock PRO MAX</h1>

<!-- Dashboard -->
<div class="grid grid-cols-4 gap-4 mb-6">
  <div class="bg-green-700 p-3">Winrate: <span id="winrate"></span></div>
  <div class="bg-blue-700 p-3">Trades: <span id="totalTrades"></span></div>
  <div class="bg-purple-700 p-3">Avg Win: <span id="avgWin"></span></div>
  <div class="bg-red-700 p-3">Avg Loss: <span id="avgLoss"></span></div>
</div>

<!-- Watchlist -->
<h2 class="text-lg">Watchlist</h2>
<table class="w-full mb-6">
<thead><tr><th>Mã</th><th>Score</th><th>Action</th></tr></thead>
<tbody id="watchlist"></tbody>
</table>

<!-- Kelly -->
<h2>Kelly</h2>
<input id="win" placeholder="Win %" class="text-black p-2">
<select id="rr" class="text-black p-2">
<option value="2">2:1</option>
<option value="3">3:1</option>
</select>
<select id="mode" class="text-black p-2">
<option value="quarter">1/4</option>
<option value="half">1/2</option>
</select>
<button onclick="calcKelly()" class="bg-blue-600 px-3 py-2">Calc</button>
<div id="kelly"></div>

</div>

<script src="supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
